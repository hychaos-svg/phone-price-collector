name: Price Collection

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      brands:
        description: '指定品牌(逗号分隔，留空则采集全部)'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run price collection
        run: |
          if [ -n "${{ github.event.inputs.brands }}" ]; then
            node scripts/github_collect.js --brands="${{ github.event.inputs.brands }}"
          else
            node scripts/github_collect.js
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: price-files
          path: data/*.xlsx
          retention-days: 30
      
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.xlsx 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Add price data $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
