version: '3.8'

services:
  price-collector:
    build: .
    container_name: phone-price-collector
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - STORAGE_TYPE=local
      - TZ=Asia/Shanghai
    restart: unless-stopped
